# P20 — kube-prometheus-stack as an ArgoCD child app under the root App-of-Apps (E13).
#
# Installs Prometheus (+ operator), Grafana, node-exporter and kube-state-metrics. This
# is the observability backbone: Prometheus scrapes the backend /metrics (via the inline
# ServiceMonitor below) + node/kube metrics; Grafana renders the app dashboard shipped by
# the sibling `monitoring-dashboards` app (a labelled ConfigMap the Grafana sidecar imports).
#
# SIZING (2x t3a.medium): Alertmanager, Windows monitoring and the EKS-unreachable
# control-plane scrapers (controller-manager/scheduler/etcd/kube-proxy — managed by EKS,
# not exposed) are DISABLED to save memory and avoid perpetually-DOWN targets. Every
# component carries explicit requests/limits (repo rule). Prometheus uses the default
# emptyDir (NO storageSpec) + short retention, so there's NO EBS PVC to orphan at the
# daily `terraform destroy` — monitoring data is rebuildable. Alerting is a later slice.
#
# ServerSideApply=true: the prometheus-operator CRDs exceed the client-side-apply
# annotation-size limit (same reason as cert-manager/cnpg here).
#
# DAY-END ORPHAN NOTE: emptyDir means no volumes to clean. The only AWS-side object is the
# nodes' existing capacity — no new LB/EBS. Nothing extra to delete before destroy.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: monitoring
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0" # CRDs + operator first; dashboards app is wave "1"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: kube-prometheus-stack
    targetRevision: 85.2.2 # operator v0.90.1 — pinned (the bootcamp-proven version)
    helm:
      releaseName: kube-prometheus-stack
      values: |
        # --- trim for a 2-node t3a.medium cluster ---------------------------------
        alertmanager:
          enabled: false        # alerting is a later slice; saves a StatefulSet + RAM
        windowsMonitoring:
          enabled: false        # no Windows nodes
        # EKS runs the control plane; these endpoints aren't scrapeable from worker
        # nodes — disabling avoids ServiceMonitors that would sit permanently DOWN.
        kubeControllerManager: { enabled: false }
        kubeScheduler:          { enabled: false }
        kubeEtcd:               { enabled: false }
        kubeProxy:              { enabled: false }

        prometheusOperator:
          resources:
            requests: { cpu: 50m,  memory: 128Mi }
            limits:   { cpu: 200m, memory: 256Mi }
          admissionWebhooks:
            patch:
              resources:
                requests: { cpu: 25m,  memory: 32Mi }
                limits:   { cpu: 100m, memory: 128Mi }
          # The config-reloader runs as BOTH an init container and a sidecar in every
          # Prometheus pod — the chart defaults it to {} (uncapped), so cap it here to
          # honour the "requests/limits on every container" rule.
          prometheusConfigReloader:
            resources:
              requests: { cpu: 10m, memory: 16Mi }
              limits:   { cpu: 50m, memory: 32Mi }

        prometheus:
          prometheusSpec:
            # Discover OUR ServiceMonitors/Rules regardless of a Helm release label —
            # without this the operator only selects objects carrying its own release
            # label, and the backend ServiceMonitor below would be invisible.
            serviceMonitorSelectorNilUsesHelmValues: false
            podMonitorSelectorNilUsesHelmValues: false
            probeSelectorNilUsesHelmValues: false
            ruleSelectorNilUsesHelmValues: false
            retention: 2d                 # short; emptyDir storage (no PVC → no orphan)
            resources:
              requests: { cpu: 100m, memory: 512Mi }
              limits:   { cpu: 500m, memory: 1Gi }
          # The backend app-metrics target, declared inline (sibling of prometheusSpec)
          # so the operator owns the ServiceMonitor and there's no CRD-before-CR race.
          additionalServiceMonitors:
            - name: modelmatch-backend
              namespaceSelector:
                matchNames: [app]
              selector:
                matchLabels:
                  app.kubernetes.io/name: backend
                  app.kubernetes.io/instance: modelmatch
              endpoints:
                - port: http              # the backend Service's named 8000 port
                  path: /metrics
                  interval: 30s

        grafana:
          # admin user defaults to "admin"; the password is the chart default and is NOT
          # set here (no credential in git). Access is port-forward-only for now (no
          # ingress host) — see the P20 handoff fork. Dashboards-as-code: the stack's
          # sidecar (enabled by default, label grafana_dashboard=1, searchNamespace ALL)
          # imports the ConfigMap shipped by the monitoring-dashboards app.
          persistence:
            enabled: false               # dashboards come from ConfigMaps → no PVC needed
          resources:
            requests: { cpu: 50m,  memory: 128Mi }
            limits:   { cpu: 200m, memory: 256Mi }
          # The dashboard + datasource sidecar containers only get resources when
          # grafana.sidecar.resources is set (chart defaults them to {}). Cap them too.
          sidecar:
            resources:
              requests: { cpu: 10m, memory: 32Mi }
              limits:   { cpu: 50m, memory: 64Mi }

        kube-state-metrics:
          resources:
            requests: { cpu: 25m,  memory: 64Mi }
            limits:   { cpu: 100m, memory: 128Mi }

        prometheus-node-exporter:
          resources:
            requests: { cpu: 25m,  memory: 32Mi }
            limits:   { cpu: 100m, memory: 64Mi }
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true       # ArgoCD owns the monitoring namespace
      - ServerSideApply=true       # large operator CRDs — avoid the annotation-size limit
