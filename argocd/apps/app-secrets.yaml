# P12 — app-secrets as an ArgoCD child app under the root App-of-Apps.
#
# Renders the in-repo charts/app-secrets chart (the SecretStore + ExternalSecret) so
# ESO syncs JWT_SECRET / POSTGRES_PASSWORD / CHAT_READONLY_DB_PASSWORD from AWS Secrets
# Manager (`modelmatch/app`) into the K8s Secret `modelmatch-app-secrets` in `app`.
# That Secret must exist BEFORE Postgres (P13) and the backend (P14), so this deploys
# on its own lifecycle now — NOT as part of the umbrella child app (P14).
#
# Unlike the P11 platform child-apps (which pull UPSTREAM Helm repos), this one points
# at OUR OWN repo over public HTTPS — same anonymous read ArgoCD already uses for the
# root app; no credential/Secret in Git or ArgoCD.
#
# NO CreateNamespace: the `app` namespace is Terraform-owned (P10) — single owner.
# No CRDs/SSA needed: SecretStore/ExternalSecret are small CRs (ESO installed its CRDs
# at P11). ArgoCD ignores the .status ESO writes, so no ignoreDifferences is required.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: app-secrets
  namespace: argocd
  # Cascade-delete the SecretStore/ExternalSecret (and ESO then GCs the synced Secret)
  # if this Application is pruned (its YAML removed from Git).
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/Steve-droid/modelmatch-gitops.git
    targetRevision: main
    path: charts/app-secrets
  destination:
    server: https://kubernetes.default.svc
    namespace: app
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
