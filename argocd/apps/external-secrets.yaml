# P11 — External Secrets Operator (ESO) as an ArgoCD child app under the root App-of-Apps.
#
# Installs the upstream external-secrets chart (controller + webhook + cert-controller) and its CRDs.
# P11 only INSTALLS ESO with the right SA/IRSA wiring; the SecretStore + ExternalSecret that USE it to
# pull JWT_SECRET / DB password / LLM-cap config from AWS Secrets Manager are P12 — NOT created here.
#
# IRSA (the load-bearing contract): infra P7 created role B `modelmatch-eso-irsa`, whose trust is bound
# to `system:serviceaccount:external-secrets:external-secrets`. So the install MUST land in namespace
# `external-secrets` with the MAIN controller SA named `external-secrets`, annotated with role B's ARN.
# Only the main controller talks to Secrets Manager — the webhook/certController SAs need no IRSA.
# (OIDC issuer regenerates on every cluster rebuild, but role B is name-stable and its trust re-binds
# in Terraform, so this ARN never changes.)
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: external-secrets
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://charts.external-secrets.io
    chart: external-secrets
    targetRevision: 2.6.0 # app v2.6.0 — pinned (latest stable as of 2026-06-14)
    helm:
      releaseName: external-secrets
      values: |
        installCRDs: true
        # Main controller SA — name pinned + annotated so it matches role B's trust exactly.
        serviceAccount:
          name: external-secrets
          annotations:
            eks.amazonaws.com/role-arn: arn:aws:iam::832285994273:role/modelmatch-eso-irsa
        # Lean caps on all three ESO components (P10 precedent).
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 256Mi
        webhook:
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 128Mi
        certController:
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 128Mi
  destination:
    server: https://kubernetes.default.svc
    namespace: external-secrets
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true # ESO CRDs are large — avoid the client-side-apply annotation-size limit
