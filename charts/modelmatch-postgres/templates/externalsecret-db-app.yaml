# ExternalSecret → a kubernetes.io/basic-auth Secret for CNPG's owner role.
#
# WHY: CNPG's bootstrap.initdb.secret expects a basic-auth Secret (username +
# password). Our P12 platform Secret `modelmatch-app-secrets` is Opaque and carries
# only the raw POSTGRES_PASSWORD. Rather than duplicate the password anywhere, this
# ExternalSecret pulls the SAME value from AWS Secrets Manager (via the P12
# SecretStore, auth = ESO role-B IRSA — no static keys) and TEMPLATES it into a
# basic-auth Secret whose `username` matches the cluster owner.
#
# NO secret values in Git — only the source key name + a static username. ESO fills
# the templated password placeholder (escaped below so Helm passes it through verbatim
# for ESO to evaluate at sync time).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ .Values.appUserSecret.name }}
  namespace: {{ .Values.namespace }}
  annotations:
    # Create the credential before the Cluster bootstraps (CNPG also retries if late).
    argocd.argoproj.io/sync-wave: "-1"
spec:
  refreshInterval: {{ .Values.appUserSecret.refreshInterval }}
  secretStoreRef:
    name: {{ .Values.appUserSecret.secretStoreName }}
    kind: SecretStore
  target:
    name: {{ .Values.appUserSecret.name }}
    creationPolicy: Owner
    template:
      # CNPG validates this against the owner; it must be a basic-auth Secret.
      type: kubernetes.io/basic-auth
      metadata:
        labels:
          # Lets CNPG reload the role password if the Secret value rotates.
          cnpg.io/reload: "true"
      data:
        username: {{ .Values.cluster.owner | quote }}
        password: "{{ `{{ .password }}` }}"
  data:
    - secretKey: password
      remoteRef:
        key: {{ .Values.appUserSecret.sourceSecretName }}
        property: POSTGRES_PASSWORD
