{{- if .Values.serviceAccount.create -}}
# Backend ServiceAccount — the IRSA identity for the in-cluster backend (P14).
#
# The role-arn annotation is what makes this SA an IRSA principal: the EKS Pod Identity
# webhook sees it and injects a projected web-identity token + AWS_ROLE_ARN /
# AWS_WEB_IDENTITY_TOKEN_FILE into every pod that uses this SA, so boto3's default
# credential chain assumes role A — Bedrock InvokeModel on the 2 Nova inference-profile
# ARNs + S3 get/put on modelmatch-ingestion-sources. NO static AWS keys anywhere.
#
# The SA NAME must stay modelmatch-backend: role A's trust policy is bound (in Terraform,
# P7) to system:serviceaccount:app:modelmatch-backend. The ARN itself is non-secret and
# lives in values (an account id + role name, no credential).
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "backend.serviceAccountName" . }}
  labels:
    {{- include "backend.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
# IRSA does not depend on the default Kubernetes API token (the webhook injects a
# SEPARATE projected volume for the AWS token), so this only governs the k8s API token.
automountServiceAccountToken: {{ .Values.serviceAccount.automount }}
{{- end }}
