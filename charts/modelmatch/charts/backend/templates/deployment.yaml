apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "backend.fullname" . }}
  labels:
    {{- include "backend.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "backend.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        # Roll the pod when the ConfigMap content changes (e.g. the P15 sslip.io host ->
        # PUBLIC_BASE_URL / CORS_ALLOW_ORIGINS) so the new env takes effect. Without this,
        # an envFrom ConfigMap change does NOT restart the pod, leaving CORS/host stale.
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
      labels:
        {{- include "backend.labels" . | nindent 8 }}
    spec:
      # IRSA identity (P14): role A reaches Bedrock + S3 with no static keys.
      serviceAccountName: {{ include "backend.serviceAccountName" . }}
      securityContext:
        runAsNonRoot: true
        # The backend image's USER is the NAME "appuser" (uid/gid 10001 per its
        # Dockerfile). runAsNonRoot can't verify a non-numeric user, so the kubelet
        # rejects the container with CreateContainerConfigError unless we pin the uid.
        # (The frontend image's USER is numeric (101), so it needs no equivalent.)
        runAsUser: 10001
        runAsGroup: 10001
      containers:
        - name: backend
          image: {{ include "backend.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.containerPort }}
              protocol: TCP
          # Non-secret config (incl. the PASSWORDLESS DATABASE_URL + CHAT_READONLY_DB_USER).
          # LLM_HOURLY_TOKEN_CAP is a non-secret ConfigMap knob, not a secret.
          envFrom:
            - configMapRef:
                name: {{ include "backend.fullname" . }}-config
          # Secrets (P14) — explicit per-key secretKeyRef into the ESO-synced Secret
          # {{ .Values.appSecretName }} (synced from Secrets Manager by ESO/role B, P12).
          # NEVER in the ConfigMap/values. Only the exact keys the backend needs.
          env:
            # libpq (psycopg) reads PGPASSWORD at connect time → the ConfigMap's
            # DATABASE_URL stays passwordless, so URL-reserved chars (@ : / % ? #) in the
            # generated password can never break DSN parsing. Pairs with that DATABASE_URL.
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.appSecretName }}
                  key: POSTGRES_PASSWORD
            # JWT signing key — required, no default (config fails fast otherwise).
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.appSecretName }}
                  key: JWT_SECRET
            # Chat read-only role's LOGIN password. With LLM_CLIENT=bedrock the backend
            # rejects a placeholder here (it's a live DB credential). The chat DSN
            # (chat_database_url) carries this inline, so it ignores PGPASSWORD.
            - name: CHAT_READONLY_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.appSecretName }}
                  key: CHAT_READONLY_DB_PASSWORD
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
