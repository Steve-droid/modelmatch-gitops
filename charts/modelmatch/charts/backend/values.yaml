# Backend subchart defaults. The umbrella's `backend:` block overrides these when
# rendered as part of the product chart; these values also make the subchart
# render standalone (`helm template charts/modelmatch/charts/backend`).
enabled: true
replicaCount: 1

# global.imageRegistry is normally injected by the umbrella; this default lets the
# subchart render on its own too.
global:
  imageRegistry: 832285994273.dkr.ecr.ap-south-1.amazonaws.com

image:
  repository: modelmatch-backend
  tag: "1.0.0"
  pullPolicy: IfNotPresent

containerPort: 8000

service:
  type: ClusterIP
  port: 8000

resources:
  requests:
    cpu: 200m
    memory: 256Mi
  limits:
    cpu: "1"
    memory: 1Gi

config:
  BASELINE_MODEL_ID: "Claude Sonnet 4.5"
  QUALITY_THRESHOLD: "0.8"
  AWS_REGION: "ap-south-1"
  BEDROCK_MODEL_ID: "apac.amazon.nova-lite-v1:0"
  S3_BUCKET: "modelmatch-ingestion-sources"
  LLM_CLIENT: "bedrock"
  LLM_HOURLY_TOKEN_CAP: "200000"
  PUBLIC_BASE_URL: "http://localhost:8000"
  CORS_ALLOW_ORIGINS: "http://localhost:5173"
