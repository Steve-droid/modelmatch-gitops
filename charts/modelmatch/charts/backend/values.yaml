# Backend subchart defaults. The umbrella's `backend:` block overrides these when
# rendered as part of the product chart; these values also make the subchart
# render standalone (`helm template charts/modelmatch/charts/backend`).
enabled: true
replicaCount: 1

# global.imageRegistry is normally injected by the umbrella; this default lets the
# subchart render on its own too.
global:
  imageRegistry: 832285994273.dkr.ecr.ap-south-1.amazonaws.com
  # P15: the public-host source of truth, normally injected by the umbrella. The
  # ConfigMap derives PUBLIC_BASE_URL/CORS_ALLOW_ORIGINS from it; this default keeps
  # standalone render working. "0.0.0.0" = not-yet-computed sentinel.
  sslipIp: "0.0.0.0"

image:
  repository: modelmatch-backend
  # 1.0.1 carries boto3 (built with --extra bedrock) for the in-cluster Bedrock surface.
  tag: "1.0.1"
  pullPolicy: IfNotPresent

containerPort: 8000

# IRSA (P14). The SA name is PINNED (role A's trust is bound to
# system:serviceaccount:app:modelmatch-backend) — do not change it. The role-arn
# annotation is a non-secret identifier (account id + role name), safe in values.
serviceAccount:
  create: true
  name: modelmatch-backend
  automount: true
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::832285994273:role/modelmatch-backend-irsa

# ESO-synced Secret (P12) the secret env reads from. Non-secret NAME, not the values.
appSecretName: modelmatch-app-secrets

service:
  type: ClusterIP
  port: 8000

resources:
  requests:
    cpu: 200m
    memory: 256Mi
  limits:
    cpu: "1"
    memory: 1Gi

config:
  BASELINE_MODEL_ID: "Claude Sonnet 4.5"
  QUALITY_THRESHOLD: "0.8"
  AWS_REGION: "ap-south-1"
  BEDROCK_MODEL_ID: "apac.amazon.nova-lite-v1:0"
  S3_BUCKET: "modelmatch-ingestion-sources"
  LLM_CLIENT: "bedrock"
  LLM_HOURLY_TOKEN_CAP: "200000"
  # P15: PUBLIC_BASE_URL + CORS_ALLOW_ORIGINS are derived from global.sslipIp in the
  # ConfigMap template (single source of truth) — not literals here.
  # Passwordless DSN (non-secret) — the password comes from PGPASSWORD (P14 secret env).
  # Host = the CNPG primary read-write Service (P13).
  DATABASE_URL: "postgresql+psycopg://modelmatch@modelmatch-postgres-rw:5432/modelmatch"
  # Chat read-only role NAME (non-secret) — must match what the P13 migration created.
  CHAT_READONLY_DB_USER: "modelmatch_chat_ro"
