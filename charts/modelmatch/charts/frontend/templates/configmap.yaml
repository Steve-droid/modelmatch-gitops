apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "frontend.fullname" . }}-config
  labels:
    {{- include "frontend.labels" . | nindent 4 }}
data:
  {{- range $key, $val := .Values.config }}
  {{ $key }}: {{ $val | quote }}
  {{- end }}
  # P15 — the public backend host the browser calls, derived from the single source of
  # truth (global.sslipIp). The entrypoint templates this into window.__APP_CONFIG__.
  API_BASE_URL: {{ printf "https://api.%s.sslip.io" (required "global.sslipIp must be set — run scripts/recompute-host.sh" .Values.global.sslipIp) | quote }}
