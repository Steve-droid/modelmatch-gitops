# Frontend subchart defaults. The umbrella's `frontend:` block overrides these when
# rendered as part of the product chart; these values also make the subchart render
# standalone (`helm template charts/modelmatch/charts/frontend`).
enabled: true
replicaCount: 1

global:
  imageRegistry: 832285994273.dkr.ecr.ap-south-1.amazonaws.com
  # P15: public-host source of truth, normally injected by the umbrella. The ConfigMap
  # derives API_BASE_URL from it; this default keeps standalone render working.
  sslipIp: "0.0.0.0"

image:
  repository: modelmatch-frontend
  tag: "1.0.0"
  pullPolicy: IfNotPresent

containerPort: 8080   # nginx-unprivileged listens on 8080 as uid 101

service:
  type: ClusterIP
  port: 80

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 250m
    memory: 128Mi

config: {}
  # P15: API_BASE_URL is browser-facing (the PUBLIC api.<ip> host, not the in-cluster
  # Service DNS) and is derived from global.sslipIp in the ConfigMap template (single
  # source of truth) — intentionally not a literal here.
