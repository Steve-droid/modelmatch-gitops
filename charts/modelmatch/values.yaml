# Umbrella values — the single place to configure the ModelMatch product chart.
#
# Layout intent (so env overrides layer cleanly later, e.g. values-dev.yaml):
#   global:    shared knobs handed to every subchart (image registry).
#   backend:   maps onto the backend subchart's values.
#   frontend:  maps onto the frontend subchart's values.
#
# NO SECRETS HERE. JWT_SECRET, the DB password (-> DATABASE_URL, composed at P14), and
# the chat read-only DB password arrive via ESO -> Secrets Manager in P12.
# LLM_HOURLY_TOKEN_CAP is a non-secret tuning knob (it stays in the ConfigMap below).
# Image tags are seeded from the ECR :1.0.0 images; the CI Deploy stage (P17/P18)
# bumps the per-subchart `tag` field.

global:
  # ECR registry (account 832285994273, ap-south-1). Shared by all subcharts.
  imageRegistry: 832285994273.dkr.ecr.ap-south-1.amazonaws.com
  # P15 — the SINGLE source of truth for the public host. It is the current public
  # IP of the one ingress ELB (P11). The ingress ELB has no static IP, so this is a
  # RECOMPUTE, not a stable name: each platform rebuild gives a new IP. Both public
  # hosts derive from it (sslip.io maps anything.<ip>.sslip.io -> <ip>):
  #   FE (browser):  app.<sslipIp>.sslip.io
  #   BE (the API):  api.<sslipIp>.sslip.io
  # Recompute with scripts/recompute-host.sh (read-only discovery + local edit),
  # then commit so ArgoCD syncs and cert-manager (re)issues the cert. See README.
  # "0.0.0.0" is the not-yet-computed sentinel (renders a valid-but-dead host so
  # `helm lint`/`template` pass; it never routes — run the script before syncing).
  sslipIp: "15.207.69.91"

# P15 — the single Kubernetes Ingress (FE + BE behind P11's ONE F5 nginx ELB).
# Host-based: app.<ip> -> frontend, api.<ip> -> backend (backend stays at root, no
# rewrite). cert-manager issues the TLS cert via the cluster-issuer annotation.
ingress:
  enabled: true
  # The IngressClass F5 registers (verify: `kubectl get ingressclass`). F5's
  # nginx.org/* annotations differ from community ingress-nginx — host-based routing
  # needs none of them (no rewrite), just this class.
  className: nginx
  # Which cert-manager ClusterIssuer (charts/cluster-issuers) signs the cert. Start
  # on letsencrypt-staging to validate HTTP-01 end-to-end, then flip to
  # letsencrypt-prod for the trusted cert (and delete the staging tls Secret so the
  # prod cert re-issues).
  clusterIssuer: letsencrypt-staging
  # cert-manager writes the issued cert here (app ns); the Ingress tls block reads it.
  tlsSecretName: modelmatch-tls
  # Service backends. Names = the subchart fullnames (release "modelmatch" + chart
  # name); the backend SA name is already pinned for IRSA, so these are stable.
  frontend:
    service: modelmatch-frontend
    port: 80
  backend:
    service: modelmatch-backend
    port: 8000

backend:
  enabled: true
  replicaCount: 1
  image:
    repository: modelmatch-backend
    # 1.0.1 = the boto3-bearing image (built with --extra bedrock) so the in-cluster
    # Bedrock surface works; 1.0.0 had no boto3. FE stays 1.0.0 (unchanged).
    tag: "1.0.1"
    pullPolicy: IfNotPresent
  containerPort: 8000
  # IRSA (P14): the backend SA assumes role A (Bedrock + S3) — no static keys. The SA
  # NAME is pinned (role A's trust = system:serviceaccount:app:modelmatch-backend); the
  # role-arn is a non-secret identifier (account id + role name), safe to keep here.
  serviceAccount:
    create: true
    name: modelmatch-backend
    automount: true
    annotations:
      eks.amazonaws.com/role-arn: arn:aws:iam::832285994273:role/modelmatch-backend-irsa
  # The ESO-synced k8s Secret (P12) the backend's secret env reads from. NAME only.
  appSecretName: modelmatch-app-secrets
  service:
    type: ClusterIP
    port: 8000
  # The ingestion-OOM gotcha: the in-cluster Nova ingestion path must stay under
  # the 1Gi cap. Request is the steady-state floor; limit is the hard ceiling.
  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 1Gi
  # Non-secret config only -> ConfigMap -> envFrom. Pydantic reads these by
  # uppercase field name. Secrets are intentionally absent (P12, ESO).
  config:
    BASELINE_MODEL_ID: "Claude Sonnet 4.5"
    QUALITY_THRESHOLD: "0.8"
    AWS_REGION: "ap-south-1"
    BEDROCK_MODEL_ID: "apac.amazon.nova-lite-v1:0"
    S3_BUCKET: "modelmatch-ingestion-sources"
    LLM_CLIENT: "bedrock"            # in-cluster path uses Bedrock via IRSA (P14)
    LLM_HOURLY_TOKEN_CAP: "200000"
    # P15: PUBLIC_BASE_URL (api.<ip> host) + CORS_ALLOW_ORIGINS (app.<ip> origin) are
    # NOT literals here — the backend ConfigMap template derives them from
    # global.sslipIp so the public host has one source of truth.
    # Passwordless DSN (non-secret); the password is injected via PGPASSWORD (P14
    # secret env). Host = the CNPG primary read-write Service (P13).
    DATABASE_URL: "postgresql+psycopg://modelmatch@modelmatch-postgres-rw:5432/modelmatch"
    # Chat read-only role NAME (non-secret) — must match the P13 migration's role.
    CHAT_READONLY_DB_USER: "modelmatch_chat_ro"

frontend:
  enabled: true
  replicaCount: 1
  image:
    repository: modelmatch-frontend
    tag: "1.0.0"
    pullPolicy: IfNotPresent
  containerPort: 8080              # nginx-unprivileged listens on 8080 (uid 101)
  service:
    type: ClusterIP
    port: 80
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 250m
      memory: 128Mi
  config: {}
    # P15: API_BASE_URL is browser-facing (the user's browser, not nginx, calls the
    # backend) = the PUBLIC api.<ip> host, NOT the in-cluster Service DNS. It is
    # derived from global.sslipIp in the frontend ConfigMap template (single source
    # of truth), so it is intentionally not a literal here.
