# ExternalSecret — tells ESO WHAT to sync and into WHICH K8s Secret. ESO reads the
# source secret in AWS Secrets Manager (via the SecretStore above) and projects the
# listed JSON properties into a K8s Secret named `targetSecretName` in the `app` ns.
#
# This manifest carries NO secret values — only the source key name + which JSON
# properties to extract. The values exist solely in AWS Secrets Manager.
#
# creationPolicy: Owner -> ESO creates the Secret and owns its lifecycle (deleting
# this ExternalSecret garbage-collects the Secret). Each `data` entry maps one JSON
# property of the source secret to one key of the target Secret (1:1, same name).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ .Values.targetSecretName }}
  namespace: {{ .Values.namespace }}
spec:
  refreshInterval: {{ .Values.refreshInterval }}
  secretStoreRef:
    name: {{ .Values.secretStoreName }}
    kind: SecretStore
  target:
    name: {{ .Values.targetSecretName }}
    creationPolicy: Owner
  data:
    {{- range .Values.keys }}
    - secretKey: {{ . }}
      remoteRef:
        key: {{ $.Values.aws.sourceSecretName }}
        property: {{ . }}
    {{- end }}
