# Namespaced SecretStore — tells ESO WHERE to read secrets for ExternalSecrets in
# the `app` namespace: AWS Secrets Manager in ap-south-1.
#
# AUTH = controller-pod IRSA (the load-bearing contract). There is deliberately NO
# `auth` / `serviceAccountRef` block: with it omitted, ESO authenticates with the
# controller pod's own credentials — i.e. role B (modelmatch-eso-irsa), which infra
# P7 trust-bound to `system:serviceaccount:external-secrets:external-secrets` and
# P11 annotated onto that SA. So NO static AWS keys reach the cluster. (A
# serviceAccountRef here would instead need an annotated SA in THIS namespace, which
# we don't have — and don't want.)
#
# Namespaced (not ClusterSecretStore): only `app` consumes platform secrets today.
apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: {{ .Values.secretStoreName }}
  namespace: {{ .Values.namespace }}
spec:
  provider:
    aws:
      service: SecretsManager
      region: {{ .Values.aws.region }}
