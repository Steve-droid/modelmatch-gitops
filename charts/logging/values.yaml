# logging values — every knob the ECK Elasticsearch + Kibana CRs and the ILM
# bootstrap Job need. P23 (E13 Observability).
#
# NO secret VALUES here (or anywhere in Git). The only credential — the ES `elastic`
# superuser password — is GENERATED by the ECK operator and stored in the Secret
# `<es.name>-es-elastic-user`; the ILM Job and Fluent Bit read it from there by ref.

# Namespace everything lands in. `logging` is Terraform-created (P10, kubernetes_namespaces);
# this chart does NOT create it (the ArgoCD child app has no CreateNamespace).
namespace: logging

# The Elastic Stack version for both the ES and Kibana operand images. Bump in lockstep.
stackVersion: "8.18.0"

# ── Elasticsearch (single-node, emptyDir) ────────────────────────────────────
elasticsearch:
  # Name → ECK derives the HTTP Service `<name>-es-http` and the credential Secret
  # `<name>-es-elastic-user` (key `elastic`) from it. Fluent Bit + the ILM Job use both.
  name: modelmatch
  # JVM heap = HALF the container memory limit (Elastic's rule of thumb): 768m heap with
  # a 1.5Gi limit leaves the other ~768m for Lucene/off-heap. Sized for the 3rd t3a.medium
  # node this slice adds (the node scale 2->3 is why P23 also touches modelmatch-infra).
  heap: "768m"
  resources:
    requests:
      cpu: "250m"
      memory: "1Gi"
    limits:
      cpu: "1"
      memory: "1536Mi"
  # emptyDir, NOT a PVC — logs are rebuildable (same call as Prometheus in P20): no EBS
  # volume to orphan at the daily `terraform destroy`, and ILM caps growth within the
  # node's life. Survival across pod restarts is intentionally NOT required for logs.
  storage:
    emptyDir:
      sizeLimit: "4Gi"

# ── Kibana (1 replica, associated to the ES above) ───────────────────────────
kibana:
  name: modelmatch
  count: 1
  resources:
    requests:
      cpu: "100m"
      memory: "512Mi"
    limits:
      cpu: "1"
      memory: "1Gi"

# ── ILM retention bootstrap (PostSync Job) ───────────────────────────────────
# Applies the modelmatch-logs ILM policy (delete @ retentionDays) + the index template
# that binds it to the Fluent Bit indices and forces 0 replicas (single node → green).
ilm:
  # The ILM policy name + the index template name (both `modelmatch-logs`).
  name: modelmatch-logs
  # Fluent Bit writes daily indices `<indexPrefix>-YYYY.MM.DD`; the template matches
  # `<indexPrefix>-*`. Keep in sync with the Fluent Bit OUTPUT Logstash_Prefix.
  indexPrefix: modelmatch-logs
  # Retention: delete indices older than this (the 1–3 day bound for the slice).
  retentionDays: 3
  image:
    # Small, non-root (uid 100) curl image — public, pinned. Only used to PUT two JSON
    # docs to the ES API; no app code or credentials baked in.
    repository: curlimages/curl
    tag: "8.11.1"
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: "25m"
      memory: "32Mi"
    limits:
      cpu: "100m"
      memory: "64Mi"
