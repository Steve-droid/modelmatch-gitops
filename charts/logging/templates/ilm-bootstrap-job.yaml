{{- $es := printf "%s-es-http" .Values.elasticsearch.name -}}
{{- $esUrl := printf "http://%s:9200" $es -}}
{{- $img := printf "%s:%s" .Values.ilm.image.repository .Values.ilm.image.tag -}}
# ILM retention bootstrap — runs as an ArgoCD PostSync HOOK, mirroring the CNPG migrate
# Job idiom. It applies, idempotently (PUT is upsert), two documents to the ES API:
#   1. an ILM policy `<ilm.name>` whose `delete` phase removes indices older than
#      <ilm.retentionDays> days — the slice's 1–3 day retention bound;
#   2. an index template binding that policy to `<ilm.indexPrefix>-*` and forcing
#      number_of_replicas=0 (single node → no unassigned replica shards → green).
#
# WHY a hook (not a plain manifest): re-syncs must re-run it, and Jobs are immutable —
# hook-delete-policy BeforeHookCreation deletes the prior Job before each sync recreates
# it. PostSync runs after the ES CR is reconciled, by which point the operator has
# created the `<es>-es-elastic-user` Secret this Job reads. The wait-loop additionally
# blocks until the ES API answers, so a slow first-boot just makes the Job wait.
#
# The `elastic` password is GENERATED by ECK and read by ref — never in Git/values.
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Values.ilm.name }}-bootstrap
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: {{ .Values.ilm.name }}-bootstrap
    app.kubernetes.io/part-of: modelmatch
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 5
  # Generous: ES first-boot (JVM start + recovery) can take a few minutes; the wait-loop
  # below polls through it.
  activeDeadlineSeconds: 900
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ .Values.ilm.name }}-bootstrap
        app.kubernetes.io/part-of: modelmatch
    spec:
      restartPolicy: Never
      securityContext:
        runAsNonRoot: true
        # curlimages/curl runs as uid/gid 100 (curl_user). Pin it so runAsNonRoot can verify.
        runAsUser: 100
        runAsGroup: 100
      containers:
        - name: ilm-bootstrap
          image: {{ $img | quote }}
          imagePullPolicy: {{ .Values.ilm.image.pullPolicy }}
          env:
            # The ES superuser password, generated + owned by the ECK operator.
            - name: ES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.elasticsearch.name }}-es-elastic-user
                  key: elastic
          command:
            - /bin/sh
            - -ec
            - |
              ES="{{ $esUrl }}"
              AUTH="elastic:${ES_PASSWORD}"

              echo "waiting for Elasticsearch at ${ES} ..."
              i=0
              until curl -fsS -u "${AUTH}" "${ES}/_cluster/health?wait_for_status=yellow&timeout=5s" >/dev/null 2>&1; do
                i=$((i+1))
                if [ "$i" -ge 120 ]; then echo "timed out waiting for ES"; exit 1; fi
                echo "  ES not ready yet (attempt ${i})"; sleep 5
              done
              echo "Elasticsearch is up."

              echo "applying ILM policy {{ .Values.ilm.name }} (delete @ {{ .Values.ilm.retentionDays }}d) ..."
              curl -fsS -u "${AUTH}" -XPUT "${ES}/_ilm/policy/{{ .Values.ilm.name }}" \
                -H 'Content-Type: application/json' -d '{
                  "policy": {
                    "phases": {
                      "hot":    { "min_age": "0ms", "actions": {} },
                      "delete": { "min_age": "{{ .Values.ilm.retentionDays }}d", "actions": { "delete": {} } }
                    }
                  }
                }'

              echo "applying index template {{ .Values.ilm.name }} for {{ .Values.ilm.indexPrefix }}-* ..."
              curl -fsS -u "${AUTH}" -XPUT "${ES}/_index_template/{{ .Values.ilm.name }}" \
                -H 'Content-Type: application/json' -d '{
                  "index_patterns": ["{{ .Values.ilm.indexPrefix }}-*"],
                  "template": {
                    "settings": {
                      "number_of_shards": 1,
                      "number_of_replicas": 0,
                      "index.lifecycle.name": "{{ .Values.ilm.name }}"
                    }
                  }
                }'

              echo "ILM bootstrap complete."
          resources:
            requests:
              cpu: {{ .Values.ilm.resources.requests.cpu | quote }}
              memory: {{ .Values.ilm.resources.requests.memory | quote }}
            limits:
              cpu: {{ .Values.ilm.resources.limits.cpu | quote }}
              memory: {{ .Values.ilm.resources.limits.memory | quote }}
